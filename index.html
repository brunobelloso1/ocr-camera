<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro - Solo Números</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }

        #scanner-visor {
            position: relative;
            width: 300px; 
            height: 100px;
            border: 3px solid #00ff00;
            border-radius: 12px;
            overflow: hidden;
            background: black;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            margin-top: 10px;
            touch-action: none;
        }

        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
        }

        .controls { 
            margin: 20px 0; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            justify-content: center;
        }

        #status {
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .list-container {
            width: 100%;
            max-width: 320px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            text-align: center;
            letter-spacing: 1px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
            touch-action: manipulation;
        }

        #start-btn { background: #007bff; color: white; }
        #copy-btn { background: #444; color: white; }
        #copy-fmt-btn { background: #f39c12; color: white; }
        
        .copied { background: #28a745 !important; }
    </style>
</head>
<body>

    <h3>Escáner de Números</h3>
    <p id="status">Cargando...</p>

    <div id="scanner-visor">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Iniciar Escaneo</button>
        <button id="copy-btn">Copiar Lista (Normal)</button>
        <button id="copy-fmt-btn">Copiar Formateado</button>
    </div>

    <div class="list-container">
        <ul id="results-list"></ul>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const listUI = document.getElementById('results-list');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyFmtBtn = document.getElementById('copy-fmt-btn');

        const detectedValues = new Set();
        let isScanning = false;

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 }
                });
                video.srcObject = stream;
                status.innerText = "Listo";
            } catch (err) {
                status.innerText = "Error: Sin acceso a cámara.";
            }
        }

        async function scanFrame() {
            if (!isScanning) return;

            const ctx = canvas.getContext('2d', { alpha: false });
            const scanW = 450; 
            const scanH = 150;
            const startX = (video.videoWidth / 2) - (scanW / 2);
            const startY = (video.videoHeight / 2) - (scanH / 2);

            canvas.width = scanW;
            canvas.height = scanH;
            ctx.drawImage(video, startX, startY, scanW, scanH, 0, 0, scanW, scanH);

            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const regex = /(00111|00008)-\d{8}/g;
                const matches = text.match(regex);

                if (matches) {
                    matches.forEach(match => {
                        if (!detectedValues.has(match)) {
                            detectedValues.add(match);
                            const li = document.createElement('li');
                            li.textContent = match;
                            listUI.prepend(li);
                            if (navigator.vibrate) navigator.vibrate(50);
                        }
                    });
                }
            } catch (e) { console.error(e); }
            setTimeout(scanFrame, 700);
        }

        // Función auxiliar para copiar y animar botón
        async function copyToClipboard(text, button) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = button.innerText;
                button.innerText = "¡Copiado!";
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert("Error al copiar: " + err);
            }
        }

        // COPIAR NORMAL (Lista con saltos de línea)
        copyBtn.addEventListener('click', () => {
            if (detectedValues.size === 0) return alert("Lista vacía");
            const text = Array.from(detectedValues).join('\n');
            copyToClipboard(text, copyBtn);
        });

        // COPIAR FORMATEADO (Ejemplo: 11100019321-11100019316)
        copyFmtBtn.addEventListener('click', () => {
            if (detectedValues.size === 0) return alert("Lista vacía");
            
            // Procesar cada número: quitar guion y luego ceros a la izquierda
            const formattedArray = Array.from(detectedValues).map(val => {
                return val.replace(/-/g, '').replace(/^0+/, '');
            });

            // Unir todos con un guion medio
            const textToCopy = formattedArray.join('-');
            copyToClipboard(textToCopy, copyFmtBtn);
        });

        startBtn.addEventListener('click', () => {
            isScanning = !isScanning;
            startBtn.innerText = isScanning ? "Detener" : "Iniciar Escaneo";
            startBtn.style.background = isScanning ? "#ff4444" : "#007bff";
            if (isScanning) {
                status.innerText = "Escaneando...";
                scanFrame();
            } else {
                status.innerText = "Pausado";
            }
        });

        setupCamera();
    </script>
</body>
</html>
