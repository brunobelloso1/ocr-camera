<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner OCR Enfocado</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212; /* Fondo oscuro para que resalte el visor */
            color: white;
            margin: 0;
            padding: 20px;
        }

        /* Contenedor que hace el recorte (visor) */
        #scanner-visor {
            position: relative;
            width: 300px;  /* Ancho del rectángulo */
            height: 100px; /* Alto del rectángulo */
            border: 3px solid #00ff00;
            border-radius: 12px;
            overflow: hidden; /* Esto oculta el resto de la cámara */
            background: black;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        video {
            position: absolute;
            /* Centramos el video dentro del visor */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
        }

        .controls { margin: 25px 0; }

        #status {
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 10px;
            text-align: center;
        }

        .list-container {
            width: 100%;
            max-width: 350px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h3>Escáner de Números</h3>
    <p id="status">Iniciando cámara...</p>

    <div id="scanner-visor">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="start-btn">Cargando...</button>
    </div>

    <div class="list-container">
        <ul id="results-list"></ul>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const list = document.getElementById('results-list');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        const detectedValues = new Set();
        let isScanning = false;

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 }
                });
                video.srcObject = stream;
                startBtn.innerText = "Iniciar Escaneo";
                status.innerText = "Listo para escanear";
            } catch (err) {
                status.innerText = "Error: Acceso denegado a la cámara.";
            }
        }

        async function scanFrame() {
            if (!isScanning) return;

            const ctx = canvas.getContext('2d', { alpha: false });
            
            // Definimos el área de recorte (el centro del video)
            // Esto mejora mucho la velocidad porque el OCR solo lee una imagen pequeña
            const scanW = 400; 
            const scanH = 150;
            const startX = (video.videoWidth / 2) - (scanW / 2);
            const startY = (video.videoHeight / 2) - (scanH / 2);

            canvas.width = scanW;
            canvas.height = scanH;

            // Dibujamos solo el pedazo central del video en el canvas
            ctx.drawImage(video, startX, startY, scanW, scanH, 0, 0, scanW, scanH);

            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const regex = /(00111|00008)-\d{8}/g;
                const matches = text.match(regex);

                if (matches) {
                    matches.forEach(match => {
                        if (!detectedValues.has(match)) {
                            detectedValues.add(match);
                            const li = document.createElement('li');
                            li.innerHTML = `<span>${match}</span> <small>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;
                            list.prepend(li);
                            if (navigator.vibrate) navigator.vibrate(70);
                        }
                    });
                }
            } catch (e) {
                console.error(e);
            }

            // Intervalo rápido: cada 600ms para que se sienta ágil
            setTimeout(scanFrame, 600);
        }

        startBtn.addEventListener('click', () => {
            isScanning = !isScanning;
            startBtn.innerText = isScanning ? "Detener" : "Iniciar Escaneo";
            startBtn.style.background = isScanning ? "#ff4444" : "#007bff";
            if (isScanning) {
                status.innerText = "Buscando números...";
                scanFrame();
            } else {
                status.innerText = "Escaneo pausado";
            }
        });

        setupCamera();
    </script>
</body>
</html>
